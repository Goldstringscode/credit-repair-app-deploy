name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so env-validation doesn't throw during the build
          NODE_ENV: production
          JWT_SECRET: ci-dummy-jwt-secret-at-least-32-chars-long
          ENCRYPTION_MASTER_KEY: ci-dummy-encryption-key-at-least-32-chars
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname
          NEXT_PUBLIC_APP_URL: https://example.com
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          SHIPENGINE_API_KEY: placeholder-shipengine-key
          OPENAI_API_KEY: sk-placeholder-openai-key
