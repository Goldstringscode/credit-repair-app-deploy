name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          JWT_SECRET: ci-dummy-jwt-secret-at-least-32-chars-long
          ENCRYPTION_MASTER_KEY: ci-dummy-encryption-key-at-least-32-chars
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname
          NEXT_PUBLIC_APP_URL: https://example.com
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Test
        run: npm test || true
        continue-on-error: true
        env:
          NODE_ENV: test
          JWT_SECRET: ci-dummy-jwt-secret-at-least-32-chars-long
          ENCRYPTION_MASTER_KEY: ci-dummy-encryption-key-at-least-32-chars
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname
          NEXT_PUBLIC_APP_URL: https://example.com
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          JWT_SECRET: ci-dummy-jwt-secret-at-least-32-chars-long
          ENCRYPTION_MASTER_KEY: ci-dummy-encryption-key-at-least-32-chars
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname
          NEXT_PUBLIC_APP_URL: https://meritpointai.com
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
          OPENAI_API_KEY: sk-placeholder-key-for-ci-build-only
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          SHIPPO_API_KEY: placeholder
          TWILIO_ACCOUNT_SID: placeholder
          TWILIO_AUTH_TOKEN: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
